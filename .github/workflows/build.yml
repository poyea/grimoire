name: Build PDFs

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Lint chapters
        run: python3 scripts/lint_chapters.py

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        subject:
          - coding
          - cpu-architecture
          - database
          - gpu-architecture
          - linux-kernel
          - llm
          - networking
          - programming-languages
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v3
        with:
          typst-version: 'latest'
      - name: Compile ${{ matrix.subject }}.typ
        run: typst compile "${{ matrix.subject }}.typ" "${{ matrix.subject }}.pdf"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.subject }}-pdf
          path: ${{ matrix.subject }}.pdf
          retention-days: 14
